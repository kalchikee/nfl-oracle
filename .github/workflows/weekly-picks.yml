name: NFL Weekly Picks

on:
  schedule:
    # Every Tuesday at 7 PM ET (23:00 UTC) — lines are posted, full injury report available
    # NFL season: September–February. The job checks isNFLSeason() and exits early off-season.
    - cron: '0 23 * * 2'
  workflow_dispatch:   # Manual trigger for testing

jobs:
  weekly-picks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Restore DB from the most recent artifact (carries Elo + stored predictions)
      - name: Restore database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: nfl-oracle-db
          path: data/
          if_no_artifact_found: ignore
          workflow_conclusion: ''
        continue-on-error: true

      # ML model files are committed to the repo — checkout@v4 always gets latest.
      # Removed artifact download that was overwriting committed models with stale copies.

      - name: Install dependencies
        run: npm ci

      - name: Send weekly picks to Discord
        run: npm run alerts:picks
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          LOG_LEVEL: info
          LOG_FORMAT: json

      # Save updated DB (contains new predictions for this week)
      - name: Save database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nfl-oracle-db
          path: data/nfl_oracle.db
          retention-days: 14
          overwrite: true
