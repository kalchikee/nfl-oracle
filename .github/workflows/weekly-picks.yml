name: NFL Weekly Picks

on:
  schedule:
    # Every Tuesday at 7 PM ET (23:00 UTC) — lines are posted, full injury report available
    # NFL season: September–February. The job checks isNFLSeason() and exits early off-season.
    - cron: '0 23 * * 2'
  workflow_dispatch:   # Manual trigger for testing

jobs:
  weekly-picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit predictions/<date>.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get today's date (ET)
        id: date
        run: echo "date=$(TZ='America/New_York' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Restore DB from the most recent artifact (carries Elo + stored predictions)
      - name: Restore database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: nfl-oracle-db
          path: data/
          if_no_artifact_found: ignore
          workflow_conclusion: ''
        continue-on-error: true

      # ML model files are committed to the repo — checkout@v4 always gets latest.
      # Removed artifact download that was overwriting committed models with stale copies.

      - name: Install dependencies
        run: npm ci

      - name: Send weekly picks to Discord
        run: npm run alerts:picks
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          KALSHI_MIN_PROB: '0.58'
          LOG_LEVEL: info
          LOG_FORMAT: json

      - name: Commit predictions JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions/${{ steps.date.outputs.date }}.json || true
          if ! git diff --staged --quiet; then
            git commit -m "NFL predictions ${{ steps.date.outputs.date }}"
            git push
          else
            echo "No predictions file to commit"
          fi

      # Save updated DB (contains new predictions for this week)
      - name: Save database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nfl-oracle-db
          path: data/nfl_oracle.db
          retention-days: 14
          overwrite: true
